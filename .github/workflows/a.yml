name: A main

on:
  workflow_call:
    inputs:
      kosli_trail: { required: true, type: string }
      kosli_flow:  { required: true, type: string }

env:
  KOSLI_HOST: ${{ vars.KOSLI_HOST }}
  KOSLI_ORG:  ${{ vars.KOSLI_ORG }}
  KOSLI_FLOW: monorepo-a
  KOSLI_TRAIL: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN }}
    steps:
      - uses: cyber-dojo/setup-kosli-cli@main
      - uses: actions/checkout@v6

      - name: Begin trail
        run:
          kosli begin trail "${KOSLI_TRAIL}"
            --template-file source/A/kosli.yml

      - name: Attest pull-request evidence to the trail
        run:
          kosli attest pullrequest github
            --github-token "${{ secrets.GITHUB_TOKEN }}"
            --name pull-request

      - name: Build
        run: source/A/build.sh build

      - name: Unit test
        run: source/A/build.sh unit-test

      - name: Lint
        run: source/A/build.sh lint

      - name: Package artifact
        run: source/A/build.sh image

      - name: Report artifact A
        run:
          kosli attest artifact source/A/dist/A.tar 
            --artifact-type file
            --name A

      - name: Attest A.unit-test
        run:
          kosli attest junit
            --name A.unit-test
            --results-dir source/A/reports

      - name: Attest A.lint
        run:
          kosli attest generic 
            --name A.lint 
            --compliant=true 
            --user-data source/A/reports/lint.json

      - name: A self-check
        run:
          kosli assert artifact source/A/dist/A.tar
            --artifact-type file

      # Only reached if the self-check above passed (a failed assert fails the
      # job and stops here). Records A in this commit's co-deployment set.
      - name: Attest artifact A to the shared co-deployment trail
        run:
          kosli attest artifact source/A/dist/A.tar
            --artifact-type file
            --name A
            --flow "${{ inputs.kosli_flow }}"
            --trail "${{ inputs.kosli_trail }}"
