name: A main

on:
  workflow_call:
    # A reports only to its own flow (monorepo-a). It no longer knows about the
    # shared co-deployment flow: the orchestrator's bind-A job gates A on this
    # flow and attests A's artifact into the co-deployment trail.
    outputs:
      image:
        description: "Ref of the artifact A built, for its deployment."
        value: ${{ jobs.build.outputs.image }}
      fingerprint:
        description: "SHA256 fingerprint of the artifact A built."
        value: ${{ jobs.build.outputs.fingerprint }}
      flow:
        description: "Kosli flow A reported to, for the orchestrator's bind gate."
        value: ${{ jobs.build.outputs.flow }}

env:
  KOSLI_HOST: ${{ vars.KOSLI_HOST }}
  KOSLI_ORG:  ${{ vars.KOSLI_ORG }}
  KOSLI_FLOW: monorepo-a
  KOSLI_TRAIL: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image:       ${{ steps.identity.outputs.image }}
      fingerprint: ${{ steps.identity.outputs.fingerprint }}
      flow:        ${{ steps.identity.outputs.flow }}
    permissions:
      contents: read
      pull-requests: read
    env:
      KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN }}
    steps:
      - uses: cyber-dojo/setup-kosli-cli@main
      - uses: actions/checkout@v6

      - name: Begin trail
        run:
          kosli begin trail "${KOSLI_TRAIL}"
            --template-file source/A/kosli.yml

      - name: Attest pull-request evidence to the trail
        run:
          kosli attest pullrequest github
            --github-token "${{ secrets.GITHUB_TOKEN }}"
            --name pull-request

      - name: Build
        run: source/A/build.sh build

      - name: Unit test
        run: source/A/build.sh unit-test

      - name: Lint
        run: source/A/build.sh lint

      - name: Package artifact
        run: source/A/build.sh image

      - name: Record build outputs for the orchestrator (deploy + bind gate)
        id: identity
        run: |
          image="source/A/dist/A.tar"
          fingerprint="$(kosli fingerprint --artifact-type file source/A/dist/A.tar)"
          {
            echo "image=${image}"
            echo "fingerprint=${fingerprint}"
            echo "flow=${KOSLI_FLOW}"
          } >> "${GITHUB_OUTPUT}"

      - name: Report artifact A
        run:
          kosli attest artifact source/A/dist/A.tar 
            --artifact-type file
            --name A

      - name: Attest A.unit-test
        run:
          kosli attest junit
            --name A.unit-test
            --results-dir source/A/reports

      - name: Attest A.lint
        run:
          kosli attest generic
            --name A.lint
            --compliant=true
            --user-data source/A/reports/lint.json
