name: B main

on:
  workflow_call:
    # B reports only to its own flow (monorepo-b). It no longer knows about the
    # shared co-deployment flow: the orchestrator's bind-B job gates B on this
    # flow and attests B's artifact into the co-deployment trail.
    outputs:
      image:
        description: "Ref of the artifact B built, for its deployment."
        value: ${{ jobs.build.outputs.image }}
      fingerprint:
        description: "SHA256 fingerprint of the artifact B built."
        value: ${{ jobs.build.outputs.fingerprint }}
      flow:
        description: "Kosli flow B reported to, for the orchestrator's bind gate."
        value: ${{ jobs.build.outputs.flow }}

env:
  KOSLI_HOST: ${{ vars.KOSLI_HOST }}
  KOSLI_ORG:  ${{ vars.KOSLI_ORG }}
  KOSLI_FLOW: monorepo-b
  KOSLI_TRAIL: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image:       ${{ steps.identity.outputs.image }}
      fingerprint: ${{ steps.identity.outputs.fingerprint }}
      flow:        ${{ steps.identity.outputs.flow }}
    permissions:
      contents: read
      pull-requests: read
    env:
      KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN }}
    steps:
      - uses: cyber-dojo/setup-kosli-cli@main
      - uses: actions/checkout@v6

      - name: Begin trail
        run:
          kosli begin trail "${KOSLI_TRAIL}"
            --template-file source/B/kosli.yml

      - name: Attest pull-request evidence to the trail
        run:
          kosli attest pullrequest github
            --github-token "${{ secrets.GITHUB_TOKEN }}"
            --name pull-request

      - name: Build
        run: source/B/build.sh build

      - name: Rubocop
        run: source/B/build.sh rubocop

      - name: Snyk container scan
        run: source/B/build.sh snyk-scan

      - name: Package artifact
        run: source/B/build.sh image

      - name: Record build outputs for the orchestrator (deploy + bind gate)
        id: identity
        run: |
          image="source/B/dist/B.tar"
          fingerprint="$(kosli fingerprint --artifact-type file source/B/dist/B.tar)"
          {
            echo "image=${image}"
            echo "fingerprint=${fingerprint}"
            echo "flow=${KOSLI_FLOW}"
          } >> "${GITHUB_OUTPUT}"

      - name: Report artifact B
        run:
          kosli attest artifact source/B/dist/B.tar
            --artifact-type file
            --name B

      - name: Attest B.rubocop
        run:
          kosli attest junit
            --name B.rubocop
            --results-dir source/B/reports

      - name: Attest B.snyk-container-scan
        run:
          kosli attest generic
            --name B.snyk-container-scan
            --compliant=true
            --user-data source/B/reports/snyk.json
