name: B main

on:
  workflow_call:
    inputs:
      kosli_trail: { required: true, type: string }
      kosli_flow:  { required: true, type: string }

env:
  KOSLI_HOST: ${{ vars.KOSLI_HOST }}
  KOSLI_ORG:  ${{ vars.KOSLI_ORG }}
  KOSLI_FLOW: monorepo-b
  KOSLI_TRAIL: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN }}
    steps:
      - uses: cyber-dojo/setup-kosli-cli@main
      - uses: actions/checkout@v6

      - name: Begin trail
        run:
          kosli begin trail "${KOSLI_TRAIL}"
            --template-file source/B/kosli.yml

      - name: Attest pull-request evidence to the trail
        run:
          kosli attest pullrequest github
            --github-token "${{ secrets.GITHUB_TOKEN }}"
            --name pull-request

      - name: Build
        run: source/B/build.sh build

      - name: Rubocop
        run: source/B/build.sh rubocop

      - name: Snyk container scan
        run: source/B/build.sh snyk-scan

      - name: Package artifact
        run: source/B/build.sh image

      - name: Report artifact B
        run:
          kosli attest artifact source/B/dist/B.tar
            --artifact-type file
            --name B

      - name: Attest B.rubocop
        run:
          kosli attest junit
            --name B.rubocop
            --results-dir source/B/reports

      - name: Attest B.snyk-container-scan
        run:
          kosli attest generic 
            --name B.snyk-container-scan 
            --compliant=true 
            --user-data source/B/reports/snyk.json

      - name: B self-check
        run:
          kosli assert artifact source/B/dist/B.tar
            --artifact-type file

      # Only reached if the self-check above passed (a failed assert fails the
      # job and stops here). Records B in this commit's co-deployment set.
      - name: Attest artifact B to the shared co-deployment trail
        run:
          kosli attest artifact source/B/dist/B.tar
            --artifact-type file
            --name B
            --flow "${{ inputs.kosli_flow }}"
            --trail "${{ inputs.kosli_trail }}"
