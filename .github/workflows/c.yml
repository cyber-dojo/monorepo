name: C min

on:
  workflow_call:
    inputs:
      kosli_trail: { required: true, type: string }
      kosli_flow:  { required: true, type: string }

env:
  KOSLI_HOST: ${{ vars.KOSLI_HOST }}
  KOSLI_ORG:  ${{ vars.KOSLI_ORG }}
  KOSLI_FLOW: monorepo-c
  KOSLI_TRAIL: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN }}
    steps:
      - uses: cyber-dojo/setup-kosli-cli@main
      - uses: actions/checkout@v6

      - name: Begin trail
        run:
          kosli begin trail "${KOSLI_TRAIL}"
            --template-file source/C/kosli.yml

      - name: Attest pull-request evidence to the trail
        run:
          kosli attest pullrequest github
            --github-token "${{ secrets.GITHUB_TOKEN }}"
            --name pull-request

      - name: Build
        run: source/C/build.sh build

      - name: Unit test
        run: source/C/build.sh unit-test

      - name: Package artifact
        run: source/C/build.sh image

      - name: Report artifact C
        run:
          kosli attest artifact source/C/dist/C.tar 
            --artifact-type file 
            --name C

      - name: Attest C.unit-test
        run:
          kosli attest junit 
            --name C.unit-test 
            --results-dir source/C/reports

      - name: C self-check
        run:
          kosli assert artifact source/C/dist/C.tar
            --artifact-type file

      # Only reached if the self-check above passed (a failed assert fails the
      # job and stops here). Records C in this commit's co-deployment set.
      - name: Attest artifact C to the shared co-deployment trail
        run:
          kosli attest artifact source/C/dist/C.tar
            --artifact-type file
            --name C
            --flow "${{ inputs.kosli_flow }}"
            --trail "${{ inputs.kosli_trail }}"
