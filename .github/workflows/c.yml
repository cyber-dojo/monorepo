name: C min

on:
  workflow_call:
    # C reports only to its own flow (monorepo-c). It no longer knows about the
    # shared co-deployment flow: the orchestrator's bind-C job gates C on this
    # flow and attests C's artifact into the co-deployment trail.
    outputs:
      image:
        description: "Ref of the artifact C built, for its deployment."
        value: ${{ jobs.build.outputs.image }}
      fingerprint:
        description: "SHA256 fingerprint of the artifact C built."
        value: ${{ jobs.build.outputs.fingerprint }}
      flow:
        description: "Kosli flow C reported to, for the orchestrator's bind gate."
        value: ${{ jobs.build.outputs.flow }}

env:
  KOSLI_HOST: ${{ vars.KOSLI_HOST }}
  KOSLI_ORG:  ${{ vars.KOSLI_ORG }}
  KOSLI_FLOW: monorepo-c
  KOSLI_TRAIL: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image:       ${{ steps.identity.outputs.image }}
      fingerprint: ${{ steps.identity.outputs.fingerprint }}
      flow:        ${{ steps.identity.outputs.flow }}
    permissions:
      contents: read
      pull-requests: read
    env:
      KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN }}
    steps:
      - uses: cyber-dojo/setup-kosli-cli@main
      - uses: actions/checkout@v6

      - name: Begin trail
        run:
          kosli begin trail "${KOSLI_TRAIL}"
            --template-file source/C/kosli.yml

      - name: Attest pull-request evidence to the trail
        run:
          kosli attest pullrequest github
            --github-token "${{ secrets.GITHUB_TOKEN }}"
            --name pull-request

      - name: Build
        run: source/C/build.sh build

      - name: Unit test
        run: source/C/build.sh unit-test

      - name: Package artifact
        run: source/C/build.sh image

      - name: Record build outputs for the orchestrator (deploy + bind gate)
        id: identity
        run: |
          image="source/C/dist/C.tar"
          fingerprint="$(kosli fingerprint --artifact-type file source/C/dist/C.tar)"
          {
            echo "image=${image}"
            echo "fingerprint=${fingerprint}"
            echo "flow=${KOSLI_FLOW}"
          } >> "${GITHUB_OUTPUT}"

      - name: Report artifact C
        run:
          kosli attest artifact source/C/dist/C.tar 
            --artifact-type file 
            --name C

      - name: Attest C.unit-test
        run:
          kosli attest junit
            --name C.unit-test
            --results-dir source/C/reports
