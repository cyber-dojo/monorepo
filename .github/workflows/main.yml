# Edit this comment to force a full workflow run: 001

# Orchestrator for the cyber-dojo monorepo.
#
# One always-on `scope` job decides which components changed, composes a Kosli
# trail template scoped to exactly those components, and opens the trail. It then
# calls each in-scope component's own reusable workflow. A final `gate` job ties
# the whole commit's compliance together with a single `kosli evaluate trail`.
#
# The full design and the reasoning behind every choice are in ../../docs/.
name: monorepo orchestrator

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  KOSLI_HOST:  ${{ vars.KOSLI_HOST }}  # https://app.kosli.com
  KOSLI_ORG:   ${{ vars.KOSLI_ORG }}   # cyber-dojo
  KOSLI_FLOW:  monorepo-co-deployment
  KOSLI_TRAIL: ${{ github.sha }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      kosli_flow:  ${{ steps.vars.outputs.kosli_flow }}
      kosli_trail: ${{ steps.vars.outputs.kosli_trail }}
    steps:
      - uses: cyber-dojo/setup-kosli-cli@main

      - name: Create flow
        run:
          kosli create flow "${KOSLI_FLOW}"
          --description="Bind shared commit deployments"
          --use-empty-template

      - name: Prepare outputs for workflow jobs
        id: vars
        run: |
          {
            echo "kosli_flow=${KOSLI_FLOW}"
            echo "kosli_trail=${KOSLI_TRAIL}"
          } > ${GITHUB_OUTPUT}


  # Always runs (no path filter). This is the single oracle: only a job that runs
  # on every commit can notice that a component which SHOULD have built did not.
  scope:
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: cyber-dojo/setup-kosli-cli@main
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # history is needed so the path filter can diff

      # "Which components exist" and "how a change is detected" both come from the
      # presence of source/<X>/kosli.yml -- one source of truth, no drift.
      - name: Generate path filters from the component fragments
        run: bin/gen-filters > .github/filters.generated.yml

      - name: Detect changed components
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: .github/filters.generated.yml

      # Compose the per-commit template (subset of the fragments) and open the
      # trail with it. The trail's compliance is now scoped to this commit.
      - name: Compose scoped template and open the trail
        if: ${{ steps.filter.outputs.changes != '[]' }}
        env:
          KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN }}
        run: |
          python3 -m pip install --quiet pyyaml
          bin/scoped-template '${{ steps.filter.outputs.changes }}' > scoped-template.yml
          echo "----- scoped template for this commit -----"
          cat scoped-template.yml
          kosli begin trail "${KOSLI_TRAIL}" \
            --template-file scoped-template.yml


  # Each in-scope component is a build + bind PAIR, kept together so adding a
  # service is a copy-paste of one pair with web renamed to the new component (plus a
  # matching source/<X>/kosli.yml and the deploy job below). Both jobs are guarded
  # by the same scope output.
  #
  # NOT a matrix: components have genuinely different build pipelines, and each bind
  # needs its matching build job's outputs (flow, fingerprint), which a matrix leg
  # cannot reach (same reason the deploy jobs are not a matrix).
  #
  # The bind is the load-bearing fail-safe: a component's bare artifact enters the
  # shared co-deployment trail ONLY after the component passes its OWN flow's gate.
  # The co-deployment gate below is presence-only and cannot re-derive a component's
  # SDLC compliance, so the evaluate-->attest chain (`set -euo pipefail` plus
  # ordering make the attest unreachable unless the evaluate --assert passed) is the
  # sole guarantee that "artifact present on the shared trail" implies "component
  # was fully compliant". A failed or skipped build skips its bind (default
  # `needs`), so the artifact stays off the shared trail and the gate denies --
  # fail-closed.
  build-web:
    needs: [setup, scope]
    if: ${{ contains(fromJSON(needs.scope.outputs.components), 'web') }}
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/web.yml
    secrets: inherit

  bind-web:
    needs: [setup, scope, build-web]
    if: ${{ contains(fromJSON(needs.scope.outputs.components), 'web') }}
    runs-on: ubuntu-latest
    env:
      KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN }}
    steps:
      - uses: cyber-dojo/setup-kosli-cli@main
      - uses: actions/checkout@v6
      - name: Gate web on its own flow, then bind it into the co-deployment set
        run: |
          set -euo pipefail
          kosli evaluate trail "${{ github.sha }}" \
            --flow "${{ needs.build-web.outputs.flow }}" \
            --policy policy/component.rego \
            --assert
          kosli attest artifact "${{ needs.build-web.outputs.image }}" \
            --fingerprint "${{ needs.build-web.outputs.fingerprint }}" \
            --name web \
            --flow "${{ needs.setup.outputs.kosli_flow }}" \
            --trail "${{ needs.setup.outputs.kosli_trail }}"


  build-dashboard:
    needs: [setup, scope]
    if: ${{ contains(fromJSON(needs.scope.outputs.components), 'dashboard') }}
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/dashboard.yml
    secrets: inherit

  bind-dashboard:
    needs: [setup, scope, build-dashboard]
    if: ${{ contains(fromJSON(needs.scope.outputs.components), 'dashboard') }}
    runs-on: ubuntu-latest
    env:
      KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN }}
    steps:
      - uses: cyber-dojo/setup-kosli-cli@main
      - uses: actions/checkout@v6
      - name: Gate dashboard on its own flow, then bind it into the co-deployment set
        run: |
          set -euo pipefail
          kosli evaluate trail "${{ github.sha }}" \
            --flow "${{ needs.build-dashboard.outputs.flow }}" \
            --policy policy/component.rego \
            --assert
          kosli attest artifact "${{ needs.build-dashboard.outputs.image }}" \
            --fingerprint "${{ needs.build-dashboard.outputs.fingerprint }}" \
            --name dashboard \
            --flow "${{ needs.setup.outputs.kosli_flow }}" \
            --trail "${{ needs.setup.outputs.kosli_trail }}"


  build-creator:
    needs: [setup, scope]
    if: ${{ contains(fromJSON(needs.scope.outputs.components), 'creator') }}
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/creator.yml
    secrets: inherit

  bind-creator:
    needs: [setup, scope, build-creator]
    if: ${{ contains(fromJSON(needs.scope.outputs.components), 'creator') }}
    runs-on: ubuntu-latest
    env:
      KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN }}
    steps:
      - uses: cyber-dojo/setup-kosli-cli@main
      - uses: actions/checkout@v6
      - name: Gate creator on its own flow, then bind it into the co-deployment set
        run: |
          set -euo pipefail
          kosli evaluate trail "${{ github.sha }}" \
            --flow "${{ needs.build-creator.outputs.flow }}" \
            --policy policy/component.rego \
            --assert
          kosli attest artifact "${{ needs.build-creator.outputs.image }}" \
            --fingerprint "${{ needs.build-creator.outputs.fingerprint }}" \
            --name creator \
            --flow "${{ needs.setup.outputs.kosli_flow }}" \
            --trail "${{ needs.setup.outputs.kosli_trail }}"

  # The synchronization barrier is `needs` here, not anything in Kosli (Kosli has
  # no wait/poll primitive). It waits on the bind jobs: every in-scope component
  # has, by now, either bound its artifact into the shared trail (after passing
  # its own gate) or failed/skipped doing so. `!cancelled()` ensures a skipped or
  # failed bind never silently skips the gate -- the gate then judges the trail as
  # it is, and a component missing from the co-deployment set drags it to deny.
  gate:
    needs: [scope, bind-web, bind-dashboard, bind-creator]
    if: ${{ !cancelled() && needs.scope.outputs.components != '[]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: cyber-dojo/setup-kosli-cli@main
      - uses: actions/checkout@v6

      - name: Tie web/dashboard/creator compliance together for this commit
        env:
          KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN }}
        run:
          kosli evaluate trail "${KOSLI_TRAIL}"
            --policy policy/gate.rego
            --assert


  # Deployment. One caller job per component, NOT a matrix: each component's
  # image+fingerprint comes from the matching build job's outputs, and a matrix
  # leg cannot reach a per-component build job's outputs. Each deploys ONLY when
  # its build ran AND the whole-commit gate passed -- an out-of-scope component
  # skips its build (so its deploy skips via `needs`), and a denied gate fails the
  # gate job (so every deploy skips). Co-deployment is all-or-nothing per commit.
  deploy-web:
    needs: [build-web, gate]
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      image:       ${{ needs.build-web.outputs.image }}
      fingerprint: ${{ needs.build-web.outputs.fingerprint }}

  deploy-dashboard:
    needs: [build-dashboard, gate]
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      image:       ${{ needs.build-dashboard.outputs.image }}
      fingerprint: ${{ needs.build-dashboard.outputs.fingerprint }}

  deploy-creator:
    needs: [build-creator, gate]
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      image:       ${{ needs.build-creator.outputs.image }}
      fingerprint: ${{ needs.build-creator.outputs.fingerprint }}

