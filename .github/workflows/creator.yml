name: creator min

on:
  workflow_call:
    # creator reports only to its own flow (monorepo-creator). It no longer knows about the
    # shared co-deployment flow: the orchestrator's bind-creator job gates creator on this
    # flow and attests creator's artifact into the co-deployment trail.
    outputs:
      image:
        description: "Ref of the artifact creator built, for its deployment."
        value: ${{ jobs.build.outputs.image }}
      fingerprint:
        description: "SHA256 fingerprint of the artifact creator built."
        value: ${{ jobs.build.outputs.fingerprint }}
      flow:
        description: "Kosli flow creator reported to, for the orchestrator's bind gate."
        value: ${{ jobs.build.outputs.flow }}

env:
  KOSLI_HOST: ${{ vars.KOSLI_HOST }}
  KOSLI_ORG:  ${{ vars.KOSLI_ORG }}
  KOSLI_FLOW: monorepo-creator
  KOSLI_TRAIL: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image:       ${{ steps.identity.outputs.image }}
      fingerprint: ${{ steps.identity.outputs.fingerprint }}
      flow:        ${{ steps.identity.outputs.flow }}
    permissions:
      contents: read
      pull-requests: read
    env:
      KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN }}
    steps:
      - uses: cyber-dojo/setup-kosli-cli@main
      - uses: actions/checkout@v6

      - name: Begin Kosli Trail
        uses: cyber-dojo/kosli-begin-trail@main
        with:
          flow_description: "UX for Group/Kata creation"
          template_filename: source/creator/kosli.yml

      - name: Attest pull-request evidence to the trail
        run:
          kosli attest pullrequest github
            --github-token "${{ secrets.GITHUB_TOKEN }}"
            --name pull-request

      - name: Build
        run: source/creator/build.sh build

      - name: Unit test
        run: source/creator/build.sh unit-test

      - name: Package artifact
        run: source/creator/build.sh image

      - name: Record build outputs for the orchestrator (deploy + bind gate)
        id: identity
        run: |
          image="source/creator/dist/creator.tar"
          fingerprint="$(kosli fingerprint --artifact-type file source/creator/dist/creator.tar)"
          {
            echo "image=${image}"
            echo "fingerprint=${fingerprint}"
            echo "flow=${KOSLI_FLOW}"
          } >> "${GITHUB_OUTPUT}"

      - name: Report artifact creator
        run:
          kosli attest artifact source/creator/dist/creator.tar 
            --artifact-type file 
            --name creator

      - name: Attest creator.unit-test
        run:
          kosli attest junit
            --name creator.unit-test
            --results-dir source/creator/reports
