name: web main

on:
  workflow_call:
    # web reports only to its own flow (monorepo-web). It no longer knows about the
    # shared co-deployment flow: the orchestrator's bind-web job gates web on this
    # flow and attests web's artifact into the co-deployment trail.
    outputs:
      image:
        description: "Ref of the artifact web built, for its deployment."
        value: ${{ jobs.build.outputs.image }}
      fingerprint:
        description: "SHA256 fingerprint of the artifact web built."
        value: ${{ jobs.build.outputs.fingerprint }}
      flow:
        description: "Kosli flow web reported to, for the orchestrator's bind gate."
        value: ${{ jobs.build.outputs.flow }}

env:
  KOSLI_HOST: ${{ vars.KOSLI_HOST }}
  KOSLI_ORG:  ${{ vars.KOSLI_ORG }}
  KOSLI_FLOW: monorepo-web
  KOSLI_TRAIL: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image:       ${{ steps.identity.outputs.image }}
      fingerprint: ${{ steps.identity.outputs.fingerprint }}
      flow:        ${{ steps.identity.outputs.flow }}
    permissions:
      contents: read
      pull-requests: read
    env:
      KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN }}
    steps:
      - uses: cyber-dojo/setup-kosli-cli@main
      - uses: actions/checkout@v6

      - name: Begin Kosli Trail
        uses: cyber-dojo/kosli-begin-trail@main
        with:
          flow_description: "UX for practicing TDD"
          template_filename: source/web/kosli.yml

      - name: Attest pull-request evidence to the trail
        run:
          kosli attest pullrequest github
            --github-token "${{ secrets.GITHUB_TOKEN }}"
            --name pull-request

      - name: Build
        run: source/web/build.sh build

      - name: Unit test
        run: source/web/build.sh unit-test

      - name: Lint
        run: source/web/build.sh lint

      - name: Package artifact
        run: source/web/build.sh image

      - name: Record build outputs for the orchestrator (deploy + bind gate)
        id: identity
        run: |
          image="source/web/dist/web.tar"
          fingerprint="$(kosli fingerprint --artifact-type file source/web/dist/web.tar)"
          {
            echo "image=${image}"
            echo "fingerprint=${fingerprint}"
            echo "flow=${KOSLI_FLOW}"
          } >> "${GITHUB_OUTPUT}"

      - name: Report artifact web
        run:
          kosli attest artifact source/web/dist/web.tar 
            --artifact-type file
            --name web

      - name: Attest web.unit-test
        run:
          kosli attest junit
            --name web.unit-test
            --results-dir source/web/reports

      - name: Attest web.lint
        run:
          kosli attest generic
            --name web.lint
            --compliant=true
            --user-data source/web/reports/lint.json
