name: dashboard main

on:
  workflow_call:
    # dashboard reports only to its own flow (monorepo-dashboard). It no longer knows about the
    # shared co-deployment flow: the orchestrator's bind-dashboard job gates dashboard on this
    # flow and attests dashboard's artifact into the co-deployment trail.
    outputs:
      image:
        description: "Ref of the artifact dashboard built, for its deployment."
        value: ${{ jobs.build.outputs.image }}
      fingerprint:
        description: "SHA256 fingerprint of the artifact dashboard built."
        value: ${{ jobs.build.outputs.fingerprint }}
      flow:
        description: "Kosli flow dashboard reported to, for the orchestrator's bind gate."
        value: ${{ jobs.build.outputs.flow }}

env:
  KOSLI_HOST: ${{ vars.KOSLI_HOST }}
  KOSLI_ORG:  ${{ vars.KOSLI_ORG }}
  KOSLI_FLOW: monorepo-dashboard
  KOSLI_TRAIL: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image:       ${{ steps.identity.outputs.image }}
      fingerprint: ${{ steps.identity.outputs.fingerprint }}
      flow:        ${{ steps.identity.outputs.flow }}
    permissions:
      contents: read
      pull-requests: read
    env:
      KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN }}
    steps:
      - uses: cyber-dojo/setup-kosli-cli@main
      - uses: actions/checkout@v6

      - name: Begin Kosli Trail
        uses: cyber-dojo/kosli-begin-trail@main
        with:
          flow_description: "UX for a group practice dashboard"
          template_filename: source/dashboard/kosli.yml

      - name: Attest pull-request evidence to the trail
        run:
          kosli attest pullrequest github
            --github-token "${{ secrets.GITHUB_TOKEN }}"
            --name pull-request

      - name: Build
        run: source/dashboard/build.sh build

      - name: Rubocop
        run: source/dashboard/build.sh rubocop

      - name: Snyk container scan
        run: source/dashboard/build.sh snyk-scan

      - name: Package artifact
        run: source/dashboard/build.sh image

      - name: Record build outputs for the orchestrator (deploy + bind gate)
        id: identity
        run: |
          image="source/dashboard/dist/dashboard.tar"
          fingerprint="$(kosli fingerprint --artifact-type file source/dashboard/dist/dashboard.tar)"
          {
            echo "image=${image}"
            echo "fingerprint=${fingerprint}"
            echo "flow=${KOSLI_FLOW}"
          } >> "${GITHUB_OUTPUT}"

      - name: Report artifact dashboard
        run:
          kosli attest artifact source/dashboard/dist/dashboard.tar
            --artifact-type file
            --name dashboard

      - name: Attest dashboard.rubocop
        run:
          kosli attest junit
            --name dashboard.rubocop
            --results-dir source/dashboard/reports

      - name: Attest dashboard.snyk-container-scan
        run:
          kosli attest generic
            --name dashboard.snyk-container-scan
            --compliant=true
            --user-data source/dashboard/reports/snyk.json
